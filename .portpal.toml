cpp = "cpp/data_structures"
cpp_test_filter = "[Dd]ata"
rust = "rust/algorithms-data-structures"
rust_test_filter = "algorithms-data-structures"
lean = "lean4/Algorithms/DataStructures/Basic.lean"
notes_heading = "## Data Structures"
readme_heading = "## Data Structures"
algorithms = ["graph", "linked_list", "double_linked_list", "stack", "queue"]

[[units]]
name = "graph"
python = ["DataStructures/Graph.py", "DataStructures/bfs.py", "DataStructures/dfs.py"]
pytest = ["tests/test_graph.py"]
rust = "rust/algorithms-graph"
rust_test_filter = "algorithms-graph"
