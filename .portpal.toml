# portpal consumer config for the Algorithms repo (see ~/Source/portpal).
# Maps each algorithm family (unit) to its Python reference, per-language stub
# paths, test filters, and the porting docs that feed hint generation.

[project]
name = "Algorithms"

[backend]
default = "auto"                          # auto | anthropic | local
local_endpoint = "http://localhost:8001"
llama_scripts_dir = "/home/nadim/Source/cpp2rustpal/scripts"

[docs]
porting_notes = "docs/porting-notes.md"
lean_bugs = "docs/lean4-catchable-bugs.md"
rust_type_mapping = "docs/python-rust-type-mapping.md"
rust_lean_conversion = "docs/rust-lean4-conversion.md"

[targets.cpp]
build = "cmake -S cpp -B cpp/build && cmake --build cpp/build -j4"
test = "ctest --test-dir cpp/build --output-on-failure"
test_filter_flag = "-R {filter}"
stub_markers = ["TODO: User implements"]
extensions = [".hpp", ".cpp"]

[targets.rust]
build = "cargo build --workspace --manifest-path rust/Cargo.toml"
test = "cargo test --manifest-path rust/Cargo.toml"
test_filter_flag = "-p {filter}"
stub_markers = ["TODO: User implements", "Placeholder - user implements", "assert!(true)"]
extensions = [".rs"]

[targets.lean]
cwd = "lean4"
build = "lake build"
test = "lake build"                       # compiling IS the test until theorems exist
stub_markers = ["sorry"]
extensions = [".lean"]

[parity]
fixtures_dir = "parity/fixtures"
[parity.runners]
python = ".venv/bin/python parity/python_adapter.py"
rust = "cargo run -q --manifest-path rust/Cargo.toml -p parity-runner --"
cpp = "cpp/build/parity/parity_runner"
lean = "lean4/.lake/build/bin/parity_runner"

[[units]]
name = "sort"
python = ["Sort/Sort.py", "Sort/MergeSort.py"]
pytest = ["tests/test_sort.py", "tests/test_mergesort.py"]
cpp = "cpp/sort"
cpp_test_filter = "[Ss]ort"
rust = "rust/algorithms-sort"
rust_test_filter = "algorithms-sort"
lean = "lean4/Algorithms/Sort/Basic.lean"
notes_heading = "## Sort"
readme_heading = "## Sort"
algorithms = ["insertion_sort", "bubble_sort", "merge_sort", "quick_sort"]

[[units]]
name = "search"
python = ["Search/Search.py"]
pytest = ["tests/test_search.py"]
cpp = "cpp/search"
cpp_test_filter = "[Ss]earch"
rust = "rust/algorithms-search"
rust_test_filter = "algorithms-search"
lean = "lean4/Algorithms/Search/Basic.lean"
notes_heading = "## Search"
readme_heading = "## Search"
algorithms = ["binary_search", "second_largest", "closest_pair", "three_sum"]

[[units]]
name = "select"
python = ["Select/Python/RSelect.py", "Select/Python/DSelect.py"]
pytest = ["tests/test_select.py"]
cpp = "cpp/select"
cpp_test_filter = "[Ss]elect"
rust = "rust/algorithms-select"
rust_test_filter = "algorithms-select"
lean = "lean4/Algorithms/Select/Basic.lean"
notes_heading = "## Select"
readme_heading = "## Select"
algorithms = ["r_select", "d_select"]

[[units]]
name = "data_structures"
python = [
    "DataStructures/LinkedList.py",
    "DataStructures/DoubleLinkedList.py",
    "DataStructures/Stack.py",
    "DataStructures/Queue.py",
    "DataStructures/Graph.py",
